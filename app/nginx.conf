# =============================================================================
# Nginx Configuration: React SPA + API Reverse Proxy
# =============================================================================
# This config does three things:
#   1. Serves the React static files
#   2. Handles SPA client-side routing (try_files fallback to index.html)
#   3. Proxies /api/ requests to the backend Node.js service
# =============================================================================

server {
    # Listen on port 80 (standard HTTP)
    listen 80;

    # Root directory where our built React files live
    # (COPY --from=build /app/dist/client puts them here)
    root /usr/share/nginx/html;
    index index.html;

    # -------------------------------------------------------------------------
    # Gzip Compression
    # -------------------------------------------------------------------------
    # Compress text-based responses to reduce transfer size
    # A 200KB JavaScript bundle becomes ~50KB over the wire
    gzip on;
    gzip_types text/css application/javascript application/json text/plain;
    gzip_min_length 256;

    # -------------------------------------------------------------------------
    # API Reverse Proxy
    # -------------------------------------------------------------------------
    # Forward /api/ requests to the Node.js backend service
    #
    # "api" is the Docker Compose service name -- Docker's internal DNS
    # resolves it to the API container's IP address automatically.
    # This only works within a Docker network (Compose sets this up).
    #
    # Why reverse proxy?
    #   - Frontend and API share the same domain (no CORS issues)
    #   - API is not exposed directly to the internet
    #   - Single entry point for all traffic
    location /api/ {
        proxy_pass http://api:3000;

        # Forward the original client info to the backend
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # -------------------------------------------------------------------------
    # Vite Hashed Assets (long-term cache)
    # -------------------------------------------------------------------------
    # Vite generates filenames with content hashes (e.g., app-3a7b2c.js)
    # If the content changes, the filename changes, so it's safe to cache
    # for a very long time. "immutable" tells browsers never to revalidate.
    location /assets/ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    # -------------------------------------------------------------------------
    # SPA Fallback (Client-Side Routing)
    # -------------------------------------------------------------------------
    # React Router handles routing on the client side. When a user navigates
    # to /products/123 and refreshes, nginx needs to serve index.html
    # (not look for a file at /products/123, which doesn't exist).
    #
    # try_files logic:
    #   1. Try to serve the exact file ($uri) -- e.g., /favicon.ico
    #   2. Try as directory ($uri/) -- e.g., /assets/
    #   3. Fall back to /index.html -- React Router takes over from there
    location / {
        try_files $uri $uri/ /index.html;
    }
}
